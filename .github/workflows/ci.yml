name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Bundle size check
        run: pnpm check:bundle-size

      - name: API surface check
        run: pnpm check:api-surface

      - name: Check ≤20 configuration keys (CONF-01)
        run: pnpm check:config-keys

      - name: Check zero outbound HTTP in built bundle (PRIV-07)
        run: pnpm check:no-network

      - name: Test
        run: pnpm test
